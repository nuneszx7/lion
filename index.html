<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>LION SCHOOL</title>
    <link rel="shortcut icon" href="./img/logo-escola.svg">
    <script src=".\app.js" type="module" defer></script>

</head>
<body>

    <header>
        <div class="logo-container">
            <img src="./img/logo-escola.svg" alt="Logo Escola">
            <span>Lion School</span>
        </div>
        <button class="btn-sair">
            <img src="./img/sair.svg" alt="">
            <!-- Sair -->
        </button>
    </header>
    
    <main>
        <section class="hero">
            <div class="intro-text">
                <h1>Escolha um <span>curso</span> para gerenciar</h1>
                <img src="./img/devices.svg" alt="Dispositivos" class="devices-img">
            </div>

            <div class="estudante">
                <img src="./img/studant.svg" alt="Estudante">
            </div>

            <div class="cursos">
                <a href="#" class="card ds">
                    <img src="./img/cursoDS.svg" alt="Desenvolvimento de Sistemas">
                </a>
                <a href="#" class="card redes">
                    <img src="./img/cursoREDES.svg" alt="Redes">
                </a>
            </div>
        </section>
    </main>

    <footer>
        <div class="contato">
            <p>(11) 4774-4700</p>
            <p>lionschool@gmail.com</p>
            <p>Rua Batata Frita, 67, Centro, Jandira</p>
        </div>
        <p>Copyright © 2026 | João Pedro</p>
        <div class="redes-sociais">
            <i class="youtube"></i>
            <i class="twitter"></i>
            <i class="instagram"></i>
            <i class="facebook"></i>
        </div>
    </footer>

</body>
</html>
